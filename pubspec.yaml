name: flutter_admob_kit
description: >-
  Production-ready AdMob library for Flutter. Flutter port of Swift AdMobKit.
  Supports Banner, Interstitial, Rewarded, Rewarded Interstitial, App Open,
  and Native ads. ViewModel-based with callbacks, auto expiry, retry logic,
  and coin tracking. No Firebase required.
version: 3.0.2
homepage: https://github.com/Ameerhamza-tech/flutter_admob_kit
repository: https://github.com/Ameerhamza-tech/flutter_admob_kit
issue_tracker: https://github.com/Ameerhamza-tech/flutter_admob_kit/issues

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  google_mobile_ads: '>=5.1.0 <7.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

topics:
  - admob
  - ads
  - monetization
  - interstitial
  - rewarded