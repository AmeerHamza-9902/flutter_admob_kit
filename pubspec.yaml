name: flutter_admob_kit
description: >
  A production-ready, config-driven AdMob library for Flutter.
  Supports interstitial, app open, banner, and native ads.
  Loads config from Firebase Remote Config with local JSON fallback.
  Zero boilerplate — just drop widgets and call one-liners.
version: 1.0.0
homepage: https://github.com/Ameerhamza-tech/admob_kit_flutter
repository: https://github.com/Ameerhamza-tech/admob_kit_flutter
issue_tracker: https://github.com/Ameerhamza-tech/admob_kit_flutter/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  google_mobile_ads: ^5.1.0
  firebase_remote_config: ^5.0.0
  firebase_core: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

topics:
  - admob
  - ads
  - google-ads
  - monetization
  - firebase
