name: flutter_admob_kit
description: AdMob library for Flutter with Banner, Interstitial, Rewarded, App Open, and Native ads support.
version: 3.0.6
homepage: https://github.com/Ameerhamza-tech/flutter_admob_kit
repository: https://github.com/Ameerhamza-tech/flutter_admob_kit
issue_tracker: https://github.com/Ameerhamza-tech/flutter_admob_kit/issues

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  google_mobile_ads: '>=5.1.0 <9.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

topics:
  - admob
  - ads
  - monetization
  - interstitial
  - rewarded
